<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Road AI Dashboard</title>

  <link rel="stylesheet" href="css/style.css"/>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

</head>

<body>

  <!-- =========================================
      HEADER
  ========================================= -->

  <header>

    <div class="logo-section">

      <div class="status-dot"></div>

      <h1>🤖 Road AI Dashboard</h1>

      <span class="system-status">
        AI SYSTEM ONLINE
      </span>

    </div>

    <div class="header-right">

      <button class="flip-btn" onclick="toggleMirror()">
        <i class="fa-solid fa-repeat"></i>
        Flip Cam
      </button>

      <div class="header-icons">
        <i class="fa-brands fa-github"></i>
        <i class="fa-solid fa-bell"></i>
        <i class="fa-solid fa-user-circle"></i>
      </div>

    </div>

  </header>

  <!-- =========================================
      MAIN CONTAINER
  ========================================= -->

  <div class="container">

    <!-- =========================================
        LEFT PANEL
    ========================================= -->

    <div class="left-panel">

      <!-- LIVE STATS -->

      <div class="info-box">

        <div class="info-title">
          <i class="fa-solid fa-chart-bar"></i>
          Live Stats
        </div>

        <div id="liveInfo">
          Waiting for detection...
        </div>

        <!-- DAMAGE SUMMARY -->

        <div class="damage-summary">

          <div class="damage-card">
            <h3 id="potholeCount">0</h3>
            <p>Potholes</p>
          </div>

          <div class="damage-card">
            <h3 id="crackCount">0</h3>
            <p>Cracks</p>
          </div>

          <div class="damage-card">
            <h3 id="debrisCount">0</h3>
            <p>Debris</p>
          </div>

        </div>

        <!-- ROAD STATUS -->

        <div id="roadStatus" class="road-status safe">
          🟢 ROAD SAFE
        </div>

      </div>

      <!-- IMAGE UPLOAD -->

      <div class="upload-box">

        <div class="info-title">
          <i class="fa-regular fa-image"></i>
          Image Upload
        </div>

        <input type="file" id="imageUpload" accept="image/*">
        <img id="previewImage" style="max-width:100%; display:none; margin-top:15px;">

        <button onclick="detectImage()">
          Analyze Image
        </button>

        <img id="detectedImage" class="preview-media">

      </div>

      <!-- VIDEO UPLOAD -->

      <div class="upload-box">

        <div class="info-title">
          <i class="fa-solid fa-film"></i>
          Video Upload
        </div>

        <input type="file" id="videoInput" accept="video/*">

        <button onclick="startVideoDetection()">
          Analyze Video
        </button>

        <div class="video-wrapper">

          <video
            id="uploadedVideo"
            class="preview-media"
            playsinline
            muted
            loop>
          </video>

          <canvas id="videoCanvas"></canvas>

        </div>

      </div>

    </div>

    <!-- =========================================
        RIGHT PANEL
    ========================================= -->

    <div class="right-panel">

      <div class="info-title">
        <i class="fa-solid fa-video"></i>
        Live Road Feed
      </div>

      <div class="camera-box">

  <div class="fps-box">
    FPS:
    <span id="fpsCounter">0</span>
  </div>

  <div class="loading" id="loadingBox">
    🔍 Analyzing...
  </div>

  <video
    id="liveVideo"
    autoplay
    muted
    playsinline>
  </video>

  <canvas id="aiCanvas"></canvas>

  <img
    id="resultImage"
    style="
      display:none;
      width:100%;
      height:100%;
      object-fit:contain;
      border-radius:15px;
    ">

</div>

    </div>

  </div>

  <!-- =========================================
      FOOTER
  ========================================= -->

  <footer>

    <div class="footer-content">

      <h3>About Project RoadDetect</h3>

      <p>
        AI-powered road damage detection using YOLOv8,
        FastAPI and Computer Vision.
      </p>

    </div>

  </footer>

  <!-- =========================================
      JS FILES
  ========================================= -->

  <script src="js/ui.js"></script>
  <script src="js/detection.js"></script>
  <script src="js/camera.js"></script>
  <script src="script.js"></script>

</body>
</html>
